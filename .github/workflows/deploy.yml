name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, but don't cancel in-progress runs
# (so a new push doesn't kill a deploy that's mid-flight).
concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Opt in to Node.js 24 ahead of the June 2026 default switch.
  # Silences the deprecation warning for actions still using Node 20.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          # GitHub Pages serves at https://<user>.github.io/<repo>/.
          # BASE_PATH must match that subpath unless a custom domain is set.
          BASE_PATH: /${{ github.event.repository.name }}
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      # GitHub Pages serves 404.html for any path it can't resolve. Mirror
      # the SPA shell to that filename so deep links (/forager/admin,
      # /forager/accept?token=…) still load the app and route client-side
      # instead of hitting the generic Pages 404.
      - name: Copy index.html to 404.html for SPA deep links
        run: cp build/index.html build/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
